<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cc无限画布</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("cc-canvas-theme");
          if (theme === "dark") document.documentElement.dataset.theme = "dark";
        } catch {
          // Theme persistence is optional.
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="无限画布">
        <div class="workspace-topbar">
          <div class="brand-row">
            <div>
              <p class="eyebrow">Local Image Canvas</p>
              <h1>cc无限画布</h1>
            </div>
            <span id="keyStatus" class="status-pill">检测中</span>
          </div>

          <div class="canvas-toolbar" aria-label="画布工具">
            <span id="requestMeta" class="muted">等待添加节点</span>
            <input id="projectNameInput" class="project-name-input" type="text" value="未命名画布" aria-label="画布名称" />
            <select id="projectSelect" class="project-select" aria-label="切换画布"></select>
            <button id="newProjectButton" type="button" class="secondary compact">新建画布</button>
            <button id="saveProjectButton" type="button" class="secondary compact">保存画布</button>
            <button id="addTaskButton" type="button" class="secondary compact">添加生图节点</button>
            <button id="addDreaminaVideoButton" type="button" class="secondary compact">添加即梦视频</button>
            <button id="generateAllButton" type="button" class="secondary compact">生成全部</button>
            <button id="addNoteButton" type="button" class="secondary compact">添加标注</button>
            <button id="addChatGptButton" type="button" class="secondary compact">添加 ChatGPT</button>
            <button id="assistantButton" type="button" class="secondary compact">画布助手</button>
            <button id="themeToggleButton" type="button" class="secondary compact">深色</button>
            <button id="zoomOutButton" type="button" class="tool-button" title="缩小" aria-label="缩小">-</button>
            <span id="zoomLevel" class="zoom-level">100%</span>
            <button id="zoomInButton" type="button" class="tool-button" title="放大" aria-label="放大">+</button>
            <button id="resetViewButton" type="button" class="secondary compact">复位</button>
            <button id="clearCanvasButton" type="button" class="secondary compact">清空</button>
            <button id="checkUpdateButton" type="button" class="secondary compact">检查更新</button>
            <button id="settingsButton" type="button" class="secondary compact">设置</button>
          </div>
        </div>

        <div id="canvasViewport" class="canvas-viewport" tabindex="0">
          <div id="canvasStage" class="canvas-stage"></div>
          <div id="emptyState" class="empty-state">
            <span class="empty-mark">IMG</span>
          </div>
          <div id="minimap" class="minimap" aria-label="小地图">
            <div id="minimapWorld" class="minimap-world"></div>
            <div id="minimapView" class="minimap-view"></div>
          </div>
        </div>

        <details class="raw-panel">
          <summary>原始响应</summary>
          <pre id="rawResponse">{}</pre>
        </details>

        <aside id="assistantPanel" class="assistant-panel" hidden>
          <div class="assistant-head">
            <div>
              <p class="eyebrow">Assistant</p>
              <h2>画布助手</h2>
            </div>
            <button id="assistantCloseButton" type="button" class="secondary compact">关闭</button>
          </div>
          <div class="assistant-actions" aria-label="助手快捷操作">
            <label class="assistant-model-picker">
              <span>模型</span>
              <select id="assistantModelSelect"></select>
            </label>
            <button id="assistantAnalyzeButton" type="button" class="secondary compact">分析选中</button>
            <button id="assistantOrganizeButton" type="button" class="secondary compact">整理建议</button>
            <button id="assistantPlanButton" type="button" class="secondary compact">生成计划</button>
            <button id="assistantImportImagesButton" type="button" class="secondary compact">导入选中图片</button>
            <button id="assistantSkillMenuButton" type="button" class="secondary compact">
              Skills <span id="assistantSkillMenuCount" class="assistant-skill-menu-count">0/0</span>
            </button>
            <button id="assistantImportSkillButton" type="button" class="secondary compact">导入 Skill</button>
            <button id="assistantClearButton" type="button" class="secondary compact">清空</button>
            <section id="assistantSkillLibrary" class="assistant-skill-library" aria-label="Skill 库" hidden>
              <div class="assistant-skill-library-head">
                <div>
                  <strong>Skill 库</strong>
                  <span id="assistantSkillSummary">未导入</span>
                </div>
                <button id="assistantSkillCloseButton" type="button" class="secondary compact">关闭</button>
              </div>
              <label class="assistant-skill-search">
                <span>搜索 Skill</span>
                <input id="assistantSkillSearchInput" type="search" placeholder="输入名称或内容关键词" />
              </label>
              <div class="assistant-skill-library-subhead">
                <span>选择本轮对话要调用的 Skill</span>
              </div>
              <div id="assistantSkillList" class="assistant-skill-list"></div>
            </section>
          </div>
          <input id="assistantSkillInput" type="file" accept=".md,.txt,.json,.yaml,.yml,.skill" multiple hidden />
          <div id="assistantMessages" class="assistant-messages" aria-live="polite"></div>
          <form id="assistantForm" class="assistant-form">
            <div id="assistantPendingAttachments" class="assistant-pending-attachments" hidden></div>
            <textarea id="assistantInput" rows="3" placeholder="问问当前画布、选中节点或下一轮提示词"></textarea>
            <button id="assistantSendButton" type="submit">发送</button>
            <button id="assistantStopButton" type="button" class="secondary" hidden>停止</button>
          </form>
        </aside>
      </section>
    </main>

    <div id="selectionToolbar" class="selection-toolbar" hidden>
      <span id="selectionMeta">已选中 0 项</span>
      <label>
        <span>图片/视频缩放</span>
        <input id="selectionScaleInput" type="number" min="5" max="400" step="5" value="50" />
      </label>
      <button id="applySelectionScaleButton" type="button">应用</button>
      <button id="reusePromptButton" type="button">复用提示词</button>
    </div>

    <dialog id="settingsDialog" class="settings-dialog">
      <form id="settingsForm" method="dialog">
        <div class="settings-head">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>设置</h2>
          </div>
          <button id="closeSettingsButton" type="button" class="secondary compact">关闭</button>
        </div>

        <label class="settings-field settings-field-full">
          <span>平台总 Key</span>
          <input id="settingsApiKey" type="password" autocomplete="off" placeholder="粘贴新的 API Key，留空则不修改" />
        </label>

        <label class="settings-field">
          <span>gpt-image-2 专用 Key</span>
          <input id="settingsGptImageKey" type="password" autocomplete="off" placeholder="留空则使用平台总 Key" />
        </label>

        <label class="settings-field">
          <span>grok-image-image / grok-3-image 专用 Key</span>
          <input id="settingsGrokImageKey" type="password" autocomplete="off" placeholder="留空则使用平台总 Key" />
        </label>

        <label class="settings-field">
          <span>gpt-5.5 助手专用 Key</span>
          <input id="settingsAssistantKey" type="password" autocomplete="off" placeholder="留空则使用平台总 Key" />
        </label>

        <label class="settings-field">
          <span>Grsai API Key</span>
          <input id="settingsGrsaiApiKey" type="password" autocomplete="off" placeholder="留空则不修改" />
        </label>

        <label class="settings-field settings-field-full">
          <span>Base URL</span>
          <input id="settingsBaseUrl" type="text" autocomplete="off" />
        </label>

        <label class="settings-field">
          <span>生图接口</span>
          <input id="settingsImageEndpoint" type="text" autocomplete="off" />
        </label>

        <label class="settings-field">
          <span>编辑接口</span>
          <input id="settingsEditEndpoint" type="text" autocomplete="off" />
        </label>

        <label class="settings-field">
          <span>对话接口</span>
          <input id="settingsChatEndpoint" type="text" autocomplete="off" />
        </label>

        <label class="settings-field settings-field-full">
          <span>默认模型</span>
          <input id="settingsDefaultModel" type="text" autocomplete="off" />
        </label>

        <label class="settings-field settings-field-full">
          <span>助手模型</span>
          <select id="settingsAssistantModel"></select>
        </label>

        <label class="settings-field settings-field-full">
          <span>文件缓存位置</span>
          <input id="settingsCacheDir" type="text" autocomplete="off" placeholder="例如 D:\ccCanvasCache" />
        </label>

        <section class="dreamina-settings settings-field-full" aria-label="即梦 CLI">
          <div class="dreamina-settings-head">
            <div>
              <strong>即梦 CLI</strong>
              <span id="dreaminaStatusText">检测中</span>
            </div>
            <div class="dreamina-settings-actions">
              <button id="dreaminaInstallButton" type="button" class="secondary compact">安装即梦 CLI</button>
              <button id="dreaminaLoginButton" type="button" class="secondary compact">登录即梦</button>
              <button id="dreaminaRefreshButton" type="button" class="secondary compact">测试连接</button>
            </div>
          </div>
          <div id="dreaminaAccountMeta" class="dreamina-account-meta muted"></div>
          <div id="dreaminaActionProgress" class="dreamina-action-progress" hidden>
            <div class="dreamina-action-track">
              <span id="dreaminaActionBar"></span>
            </div>
            <span id="dreaminaActionText">等待操作</span>
          </div>
          <div class="dreamina-help">
            <span class="dreamina-help-icon" aria-hidden="true">i</span>
            <div>
              <strong>如何安装即梦 CLI？</strong>
              <p>Windows 会直接在应用内下载安装；登录会打开系统命令窗口。其他系统或兜底场景可以复制命令到终端执行。</p>
              <div class="dreamina-help-actions">
                <button id="copyDreaminaInstallButton" type="button" class="secondary compact">复制安装命令</button>
                <button id="copyDreaminaLoginButton" type="button" class="secondary compact">复制登录命令</button>
              </div>
            </div>
          </div>
        </section>

        <div class="settings-actions">
          <span id="settingsStatus" class="muted"></span>
          <button id="saveSettingsButton" type="submit">保存设置</button>
        </div>
      </form>
    </dialog>

    <dialog id="updateDialog" class="settings-dialog update-dialog">
      <form method="dialog">
        <div class="settings-head">
          <div>
            <p class="eyebrow">Updates</p>
            <h2>版本更新</h2>
          </div>
          <button id="closeUpdateButton" type="button" class="secondary compact">关闭</button>
        </div>

        <div class="update-summary settings-field-full">
          <p id="updateStatus">等待检查</p>
          <dl>
            <div>
              <dt>当前版本</dt>
              <dd id="currentVersionText">-</dd>
            </div>
            <div>
              <dt>最新版本</dt>
              <dd id="latestVersionText">-</dd>
            </div>
            <div>
              <dt>更新文件</dt>
              <dd id="updateAssetText">-</dd>
            </div>
          </dl>
        </div>

        <div id="updateDownloadProgress" class="update-download-progress settings-field-full" hidden>
          <div class="update-download-track">
            <span id="updateDownloadBar"></span>
          </div>
          <div class="update-download-meta">
            <span id="updateDownloadPercent">0%</span>
            <span id="updateDownloadBytes">-</span>
          </div>
        </div>

        <pre id="updateReleaseNotes" class="update-notes settings-field-full" hidden></pre>

        <div class="settings-actions">
          <span id="updateRepoText" class="muted"></span>
          <div class="update-actions">
            <button id="openReleaseButton" type="button" class="secondary compact" disabled>打开发布页</button>
            <button id="downloadUpdateButton" type="button" disabled>下载更新</button>
          </div>
        </div>
      </form>
    </dialog>

    <datalist id="modelOptions">
      <option value="gpt-image-2"></option>
      <option value="nano-banana-2"></option>
      <option value="grok-image-image"></option>
      <option value="grok-3-image"></option>
      <option value="dreamina-5.0"></option>
      <option value="dreamina-4.7"></option>
    </datalist>

    <script src="/app.js" type="module"></script>
  </body>
</html>
